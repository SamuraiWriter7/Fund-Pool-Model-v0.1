openapi: 3.1.0
info:
  title: Fund Pool Model API
  version: 0.1.0
  summary: API for monthly pooled reward allocation on AI platforms
  description: >
    An implementation-oriented API for Fund Pool Model v0.1.
    This API supports contribution metrics, monthly fund-pool calculation,
    payout management, dashboard publishing, review workflows, and model versioning.

servers:
  - url: https://api.example.com/v0
    description: Production
  - url: https://sandbox.api.example.com/v0
    description: Sandbox

tags:
  - name: fund-pools
    description: Monthly pool generation and allocation runs
  - name: metrics
    description: Contribution metrics and scoring
  - name: payouts
    description: Payout amounts, carryover, and payout state
  - name: dashboard
    description: Public and private dashboard views
  - name: reviews
    description: Manual review and fraud-hold workflow
  - name: models
    description: Formula version and scoring model metadata

paths:
  /fund-pools/{month}:
    get:
      tags: [fund-pools]
      summary: Get monthly fund pool summary
      operationId: getFundPoolByMonth
      parameters:
        - $ref: '#/components/parameters/MonthParam'
      responses:
        '200':
          description: Fund pool summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FundPool'
        '404':
          $ref: '#/components/responses/NotFound'

  /fund-pools/{month}/calculate:
    post:
      tags: [fund-pools]
      summary: Trigger monthly allocation calculation
      operationId: calculateFundPool
      parameters:
        - $ref: '#/components/parameters/MonthParam'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalculationRequest'
      responses:
        '202':
          description: Calculation job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalculationJob'
        '409':
          description: Calculation already running

  /fund-pools/{month}/allocations:
    get:
      tags: [fund-pools]
      summary: List allocation results for a month
      operationId: listAllocationsByMonth
      parameters:
        - $ref: '#/components/parameters/MonthParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Allocation list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayoutPage'

  /metrics/users/{userId}:
    get:
      tags: [metrics]
      summary: Get user contribution metrics
      operationId: getUserMetrics
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
        - $ref: '#/components/parameters/MonthOptionalParam'
      responses:
        '200':
          description: User metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMetrics'
        '404':
          $ref: '#/components/responses/NotFound'

  /metrics/users/{userId}/history:
    get:
      tags: [metrics]
      summary: Get time-series history of user metrics
      operationId: getUserMetricsHistory
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
        - name: from
          in: query
          required: false
          schema:
            type: string
            pattern: '^\d{4}-\d{2}$'
        - name: to
          in: query
          required: false
          schema:
            type: string
            pattern: '^\d{4}-\d{2}$'
      responses:
        '200':
          description: Metric history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMetricsHistory'

  /metrics/clusters/{clusterId}:
    get:
      tags: [metrics]
      summary: Get anonymized cluster metrics
      operationId: getClusterMetrics
      parameters:
        - name: clusterId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/MonthOptionalParam'
      responses:
        '200':
          description: Cluster metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterMetrics'

  /payouts/users/{userId}:
    get:
      tags: [payouts]
      summary: Get payout summary for a user
      operationId: getUserPayouts
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
        - $ref: '#/components/parameters/MonthOptionalParam'
      responses:
        '200':
          description: Payout summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPayoutSummary'

  /payouts/users/{userId}/history:
    get:
      tags: [payouts]
      summary: Get payout history for a user
      operationId: getUserPayoutHistory
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
        - name: from
          in: query
          required: false
          schema:
            type: string
            pattern: '^\d{4}-\d{2}$'
        - name: to
          in: query
          required: false
          schema:
            type: string
            pattern: '^\d{4}-\d{2}$'
      responses:
        '200':
          description: Payout history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayoutPage'

  /payouts/users/{userId}/carryover:
    get:
      tags: [payouts]
      summary: Get carryover balance for a user
      operationId: getCarryoverBalance
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '200':
          description: Carryover balance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarryoverBalance'

  /payouts/{payoutId}/execute:
    post:
      tags: [payouts]
      summary: Execute a payout action
      operationId: executePayout
      parameters:
        - name: payoutId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Payout execution result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayoutExecutionResult'
        '409':
          description: Payout cannot be executed in current state

  /dashboard/public/{month}:
    get:
      tags: [dashboard]
      summary: Get public dashboard for a month
      operationId: getPublicDashboard
      parameters:
        - $ref: '#/components/parameters/MonthParam'
      responses:
        '200':
          description: Public dashboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicDashboard'

  /dashboard/private/users/{userId}:
    get:
      tags: [dashboard]
      summary: Get private dashboard for a specific user
      operationId: getPrivateUserDashboard
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
        - $ref: '#/components/parameters/MonthOptionalParam'
      responses:
        '200':
          description: Private dashboard view
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivateUserDashboard'

  /reviews/cases:
    get:
      tags: [reviews]
      summary: List review cases
      operationId: listReviewCases
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [open, resolved, rejected]
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Review case list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewCasePage'

  /reviews/cases/{caseId}:
    get:
      tags: [reviews]
      summary: Get a review case
      operationId: getReviewCase
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Review case detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewCase'
        '404':
          $ref: '#/components/responses/NotFound'

  /reviews/cases/{caseId}/resolve:
    post:
      tags: [reviews]
      summary: Resolve a review hold
      operationId: resolveReviewCase
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewResolutionRequest'
      responses:
        '200':
          description: Review resolution result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewResolutionResult'

  /models/current:
    get:
      tags: [models]
      summary: Get current scoring model version
      operationId: getCurrentModelVersion
      responses:
        '200':
          description: Current model metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScoringModel'

  /models/{version}:
    get:
      tags: [models]
      summary: Get scoring model metadata by version
      operationId: getModelVersion
      parameters:
        - name: version
          in: path
          required: true
          schema:
            type: string
            example: fund_pool_v0.1
      responses:
        '200':
          description: Model metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScoringModel'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    MonthParam:
      name: month
      in: path
      required: true
      schema:
        type: string
        pattern: '^\d{4}-\d{2}$'
      example: '2026-04'

    MonthOptionalParam:
      name: month
      in: query
      required: false
      schema:
        type: string
        pattern: '^\d{4}-\d{2}$'
      example: '2026-04'

    UserIdParam:
      name: userId
      in: path
      required: true
      schema:
        type: string
      example: usr_12345

    PageParam:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1

    PageSizeParam:
      name: pageSize
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    FundPool:
      type: object
      required:
        - month
        - poolRate
        - eligibleRevenue
        - carryoverPool
        - totalFundPool
        - status
        - formulaVersion
      properties:
        month:
          type: string
          pattern: '^\d{4}-\d{2}$'
        poolRate:
          type: number
        eligibleRevenue:
          type: number
        carryoverPool:
          type: number
        totalFundPool:
          type: number
        status:
          type: string
          enum: [draft, calculating, finalized, published]
        formulaVersion:
          type: string
        notes:
          type: array
          items:
            type: string

    CalculationRequest:
      type: object
      properties:
        forceRecalculate:
          type: boolean
          default: false
        dryRun:
          type: boolean
          default: false

    CalculationJob:
      type: object
      required:
        - jobId
        - month
        - status
      properties:
        jobId:
          type: string
        month:
          type: string
        status:
          type: string
          enum: [accepted, running, completed, failed]
        submittedAt:
          type: string
          format: date-time

    UserMetrics:
      type: object
      required:
        - userId
        - month
        - totalEvents
        - acceptedCount
        - retainedCount
        - reusedCount
        - acceptanceRate
        - retentionRate
        - reuseRate
        - uniquenessAvg
        - editQualityAvg
        - accountTrustScore
        - suspicionScore
        - planWeight
        - rawScore
        - normalizedScore
        - formulaVersion
      properties:
        userId:
          type: string
        month:
          type: string
        totalEvents:
          type: integer
        acceptedCount:
          type: integer
        retainedCount:
          type: integer
        reusedCount:
          type: integer
        acceptanceRate:
          type: number
        retentionRate:
          type: number
        reuseRate:
          type: number
        uniquenessAvg:
          type: number
        editQualityAvg:
          type: number
        accountTrustScore:
          type: number
        suspicionScore:
          type: number
        planWeight:
          type: number
        rawScore:
          type: number
        normalizedScore:
          type: number
        reviewFlag:
          type: boolean
        formulaVersion:
          type: string

    UserMetricsHistory:
      type: object
      required: [userId, items]
      properties:
        userId:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/UserMetrics'

    ClusterMetrics:
      type: object
      required:
        - clusterId
        - month
        - contributorCount
        - totalEvents
        - normalizedScore
      properties:
        clusterId:
          type: string
        month:
          type: string
        contributorCount:
          type: integer
        totalEvents:
          type: integer
        normalizedScore:
          type: number
        notes:
          type: array
          items:
            type: string

    UserPayoutSummary:
      type: object
      required:
        - userId
        - month
        - payoutAmount
        - payoutType
        - payoutStatus
        - carryoverBalance
        - formulaVersion
      properties:
        userId:
          type: string
        month:
          type: string
        payoutAmount:
          type: number
        payoutType:
          type: string
          enum: [subscription_discount, usage_credit, carryover_credit, held_for_review]
        payoutStatus:
          type: string
          enum: [pending, completed, carried_over, held_for_review, failed]
        carryoverBalance:
          type: number
        formulaVersion:
          type: string

    PayoutRecord:
      type: object
      required:
        - payoutId
        - userId
        - month
        - amount
        - payoutType
        - payoutStatus
      properties:
        payoutId:
          type: string
        userId:
          type: string
        month:
          type: string
        amount:
          type: number
        payoutType:
          type: string
          enum: [subscription_discount, usage_credit, carryover_credit, held_for_review]
        payoutStatus:
          type: string
          enum: [pending, completed, carried_over, held_for_review, failed]
        executedAt:
          type: string
          format: date-time

    PayoutPage:
      type: object
      required: [items, page, pageSize, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PayoutRecord'
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer

    CarryoverBalance:
      type: object
      required: [userId, balance]
      properties:
        userId:
          type: string
        balance:
          type: number

    PayoutExecutionResult:
      type: object
      required: [payoutId, payoutStatus]
      properties:
        payoutId:
          type: string
        payoutStatus:
          type: string
        executedAt:
          type: string
          format: date-time

    PublicDashboard:
      type: object
      required:
        - month
        - totalFundPool
        - totalContributors
        - medianPayout
        - formulaVersion
      properties:
        month:
          type: string
        totalFundPool:
          type: number
        totalContributors:
          type: integer
        medianPayout:
          type: number
        formulaVersion:
          type: string
        clusterDistribution:
          type: array
          items:
            type: object
            properties:
              clusterId:
                type: string
              contributorCount:
                type: integer
              share:
                type: number

    PrivateUserDashboard:
      type: object
      required:
        - userId
        - month
        - metrics
        - payout
      properties:
        userId:
          type: string
        month:
          type: string
        metrics:
          $ref: '#/components/schemas/UserMetrics'
        payout:
          $ref: '#/components/schemas/UserPayoutSummary'

    ReviewCase:
      type: object
      required:
        - caseId
        - userId
        - month
        - reason
        - suspicionScore
        - status
      properties:
        caseId:
          type: string
        userId:
          type: string
        month:
          type: string
        reason:
          type: string
        suspicionScore:
          type: number
        status:
          type: string
          enum: [open, resolved, rejected]
        createdAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time
        notes:
          type: array
          items:
            type: string

    ReviewCasePage:
      type: object
      required: [items, page, pageSize, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ReviewCase'
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer

    ReviewResolutionRequest:
      type: object
      required: [resolution]
      properties:
        resolution:
          type: string
          enum: [approve, reject]
        notes:
          type: string

    ReviewResolutionResult:
      type: object
      required: [caseId, status]
      properties:
        caseId:
          type: string
        status:
          type: string
          enum: [resolved, rejected]
        resolvedAt:
          type: string
          format: date-time

    ScoringModel:
      type: object
      required:
        - version
        - poolRate
        - suspicionReviewThreshold
        - scoreWeights
      properties:
        version:
          type: string
        poolRate:
          type: number
        suspicionReviewThreshold:
          type: number
        scoreWeights:
          type: object
          properties:
            acceptance:
              type: number
            uniqueness:
              type: number
            editQuality:
              type: number
            retention:
              type: number
            reuse:
              type: number
            trust:
              type: number

    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string


設計の読み方
1. /fund-pools

ここが制度の心臓です。
月ごとの基金額、計算状態、分配の起動を扱います。

役割
基金総額を返す
月次計算を開始する
分配結果一覧を返す

つまり、制度の会計本体です。

2. /metrics

ここは「誰がどれだけ貢献したか」を扱います。

役割
ユーザー別スコア
履歴推移
クラスター別集計

個人を直接晒さずに、匿名クラスター集計も並立できるようにしてあります。

3. /payouts

ここは還元結果です。

役割
今月の支払額
履歴
繰越残高
実行状態

つまり 分配の出口 です。

4. /dashboard

ここは可視化です。

公開用
総額
貢献者数
中央値
クラスター分布
本人用
自分の metrics
自分の payout

ここを作ると、一気に「制度感」が出ます。

5. /reviews

ここは不正耐性と異議申し立ての入口です。

役割
保留案件一覧
個別案件取得
resolve

つまり、制度の警察署兼裁定所です。

6. /models

ここは版管理です。

スコア式や閾値が変わると、あとで揉めます。
なので、fund_pool_v0.1 のように、計算ルールをAPIで明示的に参照可能にしておくのが重要です。

MVPとして削ってもよいもの

最初に全部作らなくてもいいです。
本当に最小なら、これで十分です。

GET  /fund-pools/{month}
POST /fund-pools/{month}/calculate
GET  /metrics/users/{userId}
GET  /payouts/users/{userId}
GET  /dashboard/public/{month}
GET  /reviews/cases
POST /reviews/cases/{caseId}/resolve
GET  /models/current          
